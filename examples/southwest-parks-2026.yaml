      - [37.624, -112.162]
      - [37.524, -112.227]
      - [37.045, -112.527]
      - [36.910, -111.459]

  # Day 4: Page → Horseshoe → Antelope → Cameron → Grand Canyon → Tusayan
  - day: 4
    color: "#7d3c1a"
