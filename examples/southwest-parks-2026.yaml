      - [36.862, -111.413]
      - [35.875, -111.413]
      - [36.061, -112.108]
      - [35.968, -112.122]

  # Day 5: Tusayan → Bright Angel → Williams → Kingman → Hoover → Vegas
  - day: 5
    color: "#5c2a14"
